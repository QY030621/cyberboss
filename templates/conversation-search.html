<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💫 我们的聊天记录</title>
<style>
:root {
  --pink-light: #fce4ec;
  --pink: #f8bbd0;
  --pink-mid: #f48fb1;
  --pink-hot: #ec407a;
  --purple-light: #f3e5f5;
  --purple: #e1bee7;
  --purple-mid: #ce93d8;
  --purple-deep: #9c27b0;
  --purple-dark: #7b1fa2;
  --glass-bg: rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.6);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(156,39,176,0.10);
  --radius-lg: 18px;
  --radius-md: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "PingFang SC","Microsoft YaHei","Hiragino Sans GB",-apple-system,sans-serif;
  background: linear-gradient(165deg, #fce4ec 0%, #f3e5f5 35%, #ede7f6 70%, #e8eaf6 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: #333;
}

/* ── Stars ── */
.stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.star {
  position:absolute; border-radius:50%;
  background:#ffd54f;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity:0;
  width:var(--size); height:var(--size);
}
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(0.4); }
  50% { opacity:0.7; transform:scale(1.1); }
}

/* ── Layout ── */
.page { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:32px 24px 80px; }

/* ── Conversation Header ── */
.convo-header {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border:1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding:24px 28px;
  margin-bottom:28px;
  text-align:center;
  box-shadow: var(--shadow-md);
}
.convo-header .title {
  font-size:22px; font-weight:700;
  background: linear-gradient(135deg, var(--pink-hot), var(--purple-deep));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
  letter-spacing: 1px;
}
.convo-header .divider {
  width:60%; height:1px; margin:0 auto 14px;
  background: linear-gradient(90deg, transparent, var(--purple), var(--pink), transparent);
}
.convo-header .stats-row {
  display:flex; justify-content:center; gap:24px; flex-wrap:wrap;
  font-size:13px; color:#9c27b0;
}
.convo-header .stats-row span { white-space:nowrap; }
.convo-header .stat-val { font-weight:700; color:var(--pink-hot); }

/* ── Search Bar ── */
.search-bar {
  display:flex; gap:10px; margin-bottom:20px; align-items:center; flex-wrap:wrap;
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border:1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding:12px 16px;
  box-shadow: var(--shadow-sm);
  position:sticky; top:16px; z-index:10;
}
.search-input {
  flex:1; min-width:160px;
  padding:10px 16px;
  border:1.5px solid var(--pink);
  border-radius:24px;
  background: rgba(255,255,255,0.7);
  font-size:14px; outline:none;
  transition: all 0.3s;
}
.search-input:focus { border-color:var(--pink-hot); box-shadow:0 0 18px rgba(236,64,122,0.18); }
.date-select {
  padding:10px 14px; border:1.5px solid var(--purple); border-radius:24px;
  background: rgba(255,255,255,0.7); font-size:13px; outline:none;
  color:var(--purple-dark); cursor:pointer; min-width:120px;
}
.btn {
  padding:10px 22px; border:none; border-radius:24px;
  font-size:13px; cursor:pointer; font-weight:600;
  transition: all 0.25s; white-space:nowrap;
}
.btn-pink { background:linear-gradient(135deg,var(--pink-mid),var(--pink-hot)); color:#fff; }
.btn-pink:hover { box-shadow:0 4px 16px rgba(236,64,122,0.35); transform:translateY(-1px); }
.btn-clear { background:rgba(206,147,216,0.2); color:var(--purple-dark); }
.btn-clear:hover { background:rgba(206,147,216,0.35); }

/* ── Date Separator ── */
.date-sep {
  display:flex; align-items:center; gap:12px;
  margin:28px 0 18px;
  position:sticky; top:108px; z-index:5;
}
.date-sep::before, .date-sep::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, transparent, var(--purple), var(--pink-mid), transparent);
}
.date-sep span {
  padding:6px 18px; border-radius:20px;
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border:1px solid var(--glass-border);
  font-size:12px; font-weight:600;
  color:var(--purple-dark);
  white-space:nowrap;
  box-shadow: var(--shadow-sm);
}

/* ── Chat Area ── */
.chat-area { display:flex; flex-direction:column; gap:4px; }

/* ── Message Row ── */
.msg-row {
  display:flex; align-items:flex-end; gap:8px;
  animation: fadeUp 0.35s ease;
  padding:2px 0;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.msg-row.rey { flex-direction:row-reverse; }
.msg-row.yanyan { flex-direction:row; }

/* ── Avatar ── */
.avatar {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 1px 4px rgba(0,0,0,0.08);
  align-self:flex-end; margin-bottom:2px;
}
.avatar-rey { background:linear-gradient(135deg,#ffe4e1,#ffd1dc); }
.avatar-yanyan { background:linear-gradient(135deg,#fce4ec,#f8bbd0); }

/* ── Bubble Wrapper ── */
.bubble-wrap {
  display:flex; flex-direction:column;
  width:max-content; max-width:68%;
  position:relative;
}
.msg-row.rey .bubble-wrap { align-items:flex-end; }
.msg-row.yanyan .bubble-wrap { align-items:flex-start; }

/* ── Bubble ── */
.bubble {
  padding:10px 16px;
  font-size:14px; line-height:1.6;
  word-break:break-word; position:relative;
  border-radius: var(--radius-md);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor:default;
}
.msg-row.rey .bubble {
  background: linear-gradient(135deg, #ffd1dc, #ff8fab);
  color:#fff;
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 8px rgba(255,143,171,0.20);
}
.msg-row.yanyan .bubble {
  background: linear-gradient(135deg, #f8bbd0, #f06292);
  color:#fff;
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 8px rgba(240,98,146,0.18);
}

/* Bubble tails */
.msg-row.rey .bubble::after {
  content:''; position:absolute; bottom:0; right:-6px;
  width:0; height:0;
  border-left: 8px solid #ff8fab;
  border-bottom: 8px solid transparent;
  border-top: 0px solid transparent;
}
.msg-row.yanyan .bubble::after {
  content:''; position:absolute; bottom:0; left:-6px;
  width:0; height:0;
  border-right: 8px solid #f06292;
  border-bottom: 8px solid transparent;
  border-top: 0px solid transparent;
}

/* Hover */
.msg-row:hover .bubble {
  transform:translateY(-2px);
  box-shadow: 0 6px 18px rgba(156,39,176,0.18);
}

/* ── Time + Status ── */
.meta-row {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:rgba(0,0,0,0.35);
  margin-top:3px; padding:0 4px;
  cursor:default;
}
.msg-row.rey .meta-row { flex-direction:row-reverse; }
.meta-row .time-short { }
.meta-row .time-full { display:none; }
.msg-row:hover .meta-row .time-full { display:inline; }
.msg-row:hover .meta-row .time-short { display:none; }

/* Read status */
.status { font-size:11px; opacity:0.7; }
.status-sent { color:#aaa; }
.status-delivered { color:#aaa; }
.status-read { color:#4fc3f7; }

/* ── Reply Quote ── */
.reply-quote {
  margin-bottom:6px; padding:6px 10px 6px 10px;
  background: rgba(255,255,255,0.25);
  border-left:3px solid rgba(255,255,255,0.6);
  border-radius:4px;
  font-size:12px; opacity:0.85;
  max-width:100%; overflow:hidden;
  white-space:nowrap; text-overflow:ellipsis;
  cursor:pointer;
}
.reply-quote .quote-label { font-weight:600; font-size:11px; opacity:0.7; margin-bottom:2px; display:block; }
.reply-quote:hover { opacity:1; background:rgba(255,255,255,0.4); }

/* ── Hover Menu ── */
.hover-menu {
  display:none; position:absolute; top:-32px; right:0;
  background:rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border:1px solid rgba(0,0,0,0.06);
  border-radius:20px;
  padding:3px 6px;
  gap:2px;
  box-shadow:0 4px 14px rgba(0,0,0,0.10);
  z-index:5;
}
.msg-row:hover .hover-menu { display:flex; }
.msg-row.rey .hover-menu { right:0; }
.msg-row.yanyan .hover-menu { left:0; right:auto; }
.menu-btn {
  width:30px; height:30px; border:none; border-radius:50%;
  background:transparent; cursor:pointer; font-size:13px;
  display:flex; align-items:center; justify-content:center;
  transition: background 0.2s; color:#888;
}
.menu-btn:hover { background:rgba(236,64,122,0.12); color:var(--pink-hot); }

/* ── Back to top ── */
.back-top {
  position:fixed; bottom:28px; right:28px;
  width:42px; height:42px; border-radius:50%;
  background: var(--glass-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border:1px solid var(--glass-border);
  font-size:20px; cursor:pointer;
  box-shadow:0 4px 16px rgba(156,39,176,0.12);
  z-index:20; color:var(--purple-dark);
  display:none; align-items:center; justify-content:center;
  transition: all 0.3s;
}
.back-top.show { display:flex; }
.back-top:hover { transform:scale(1.08); box-shadow:0 6px 22px rgba(156,39,176,0.20); }

/* ── Stats Bar ── */
.results-bar { text-align:center; margin-bottom:10px; font-size:12px; color:var(--purple-dark); }
.results-bar .highlight { color:var(--pink-hot); font-weight:700; }

/* ── Empty ── */
.empty-state { text-align:center; padding:80px 20px; }
.empty-state .mascot { font-size:72px; margin-bottom:16px; }
.empty-state p { color:var(--purple-dark); font-size:14px; line-height:2; }
.no-match { text-align:center; padding:60px 20px; }
.no-match .icon { font-size:56px; margin-bottom:12px; }

/* ── Loading ── */
.loading { text-align:center; padding:60px; }
.wand {
  display:inline-block; font-size:40px;
  animation: wandSpin 1.2s ease-in-out infinite;
}
@keyframes wandSpin {
  0% { transform:rotate(0deg) scale(1); }
  25% { transform:rotate(-12deg) scale(1.1); }
  75% { transform:rotate(12deg) scale(1.1); }
  100% { transform:rotate(0deg) scale(1); }
}
.loading p { color:var(--purple-mid); margin-top:10px; font-size:13px; }

mark {
  background: #fff176; color:#333; padding:1px 3px; border-radius:3px;
}

/* ── Copy Toast ── */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.75); color:#fff; padding:10px 24px;
  border-radius:24px; font-size:13px; z-index:100;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(-10px); } }

@media (max-width:640px) {
  .page { padding:16px 12px 80px; }
  .bubble-wrap { max-width:82%; }
  .bubble { font-size:13px; padding:8px 12px; }
  .convo-header { padding:16px 18px; }
  .convo-header .title { font-size:18px; }
  .convo-header .stats-row { gap:12px; font-size:11px; }
  .search-bar { padding:10px 12px; gap:6px; }
  .avatar { width:30px; height:30px; font-size:15px; }
  .hover-menu { display:none !important; }
  .back-top { bottom:16px; right:16px; width:38px; height:38px; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="page">

  <!-- Conversation Header -->
  <div class="convo-header">
    <div class="title">🌙 我们的聊天记录</div>
    <div class="divider"></div>
    <div class="stats-row" id="headerStats">
      <span>💖 连续聊天：<b class="stat-val" id="streakDays">-</b> 天</span>
      <span>📖 今日消息：<b class="stat-val" id="todayCount">-</b> 条</span>
      <span>🩷 契合度：<b class="stat-val" id="matchPct">-</b>%</span>
    </div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="🔍 搜索关键词…" autocomplete="off">
    <select class="date-select" id="dateSelect"></select>
    <button class="btn btn-clear" id="clearSearch" title="清除搜索">✕</button>
  </div>

  <div class="results-bar" id="resultsBar"></div>
  <div class="chat-area" id="chatArea"></div>

</div>

<button class="back-top" id="backTop" title="回到顶部">↑</button>

<script>
const $ = s => document.querySelector(s);
const starsEl = $('#stars');
const searchInput = $('#searchInput');
const clearBtn = $('#clearSearch');
const dateSelect = $('#dateSelect');
const resultsBar = $('#resultsBar');
const chatArea = $('#chatArea');
const backTop = $('#backTop');

let allMessages = [];
let currentDate = '';

// ── Stars ──
(function() {
  const f = document.createDocumentFragment();
  for (let i=0;i<55;i++) {
    const s = document.createElement('div');
    s.className='star';
    s.style.setProperty('--size',(1.5+Math.random()*3)+'px');
    s.style.setProperty('--dur',(2.5+Math.random()*4)+'s');
    s.style.setProperty('--delay',Math.random()*6+'s');
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    f.appendChild(s);
  }
  starsEl.appendChild(f);
})();

// ── Dates ──
async function loadDates() {
  try {
    const res = await fetch('/api/dates');
    const {dates} = await res.json();
    dateSelect.innerHTML='';
    const today = new Date().toISOString().slice(0,10);
    let list = dates.length ? dates : [today];
    for (const d of [...list].reverse()) {
      const o = document.createElement('option');
      o.value=d; o.textContent=d; dateSelect.appendChild(o);
    }
    dateSelect.value = list.includes(today) ? today : list[list.length-1];
    currentDate = dateSelect.value;
  } catch(e) { console.error(e); }
}

// ── Load ──
async function loadMessages() {
  chatArea.innerHTML='<div class="loading"><div class="wand">🪄</div><p>魔法加载中…</p></div>';
  try {
    const res = await fetch('/api/conversations?date='+encodeURIComponent(currentDate));
    const {messages} = await res.json();
    // Already sorted by timestamp ASC from server
    allMessages = messages;
    render();
  } catch(e) {
    chatArea.innerHTML='<div class="no-match"><div class="icon">💔</div><p>加载失败，请检查连接</p></div>';
    allMessages=[];
  }
}

// ── Time helpers ──
function formatShort(ts) {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function formatFull(ts) {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  return d.getFullYear()+'-'+
    (d.getMonth()+1).toString().padStart(2,'0')+'-'+
    d.getDate().toString().padStart(2,'0')+' '+
    d.getHours().toString().padStart(2,'0')+':'+
    d.getMinutes().toString().padStart(2,'0')+':'+
    d.getSeconds().toString().padStart(2,'0');
}
function formatDateLabel(ts) {
  const d = new Date(ts);
  if (isNaN(d.getTime())) return '';
  return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');
}

// ── Compute streak ──
function computeStreak(dates) {
  if (!dates.length) return 0;
  const sorted = [...dates].sort().reverse();
  let streak = 1;
  for (let i=1;i<sorted.length;i++) {
    const prev = new Date(sorted[i-1]);
    const cur = new Date(sorted[i]);
    const diff = (prev - cur) / 86400000;
    if (Math.abs(diff - 1) < 0.5) streak++;
    else break;
  }
  // Add today if we have it
  const today = new Date().toISOString().slice(0,10);
  if (sorted[0] === today) streak = Math.max(streak, 1);
  return streak;
}

// ── Render ──
function render() {
  const kw = searchInput.value.trim().toLowerCase();
  let msgs = allMessages;
  if (kw) {
    msgs = allMessages.filter(m => m.text.toLowerCase().includes(kw));
  }

  // Results bar
  if (kw) {
    resultsBar.innerHTML = msgs.length
      ? '🔍 找到 <span class="highlight">'+msgs.length+'</span> 条「<span class="highlight">'+escHtml(kw)+'</span>」'
      : '未找到「<span class="highlight">'+escHtml(kw)+'</span>」';
  } else {
    resultsBar.innerHTML = allMessages.length
      ? '📖 共 <span class="highlight">'+allMessages.length+'</span> 条消息'
      : '';
  }
  clearBtn.style.display = kw ? '' : 'none';

  // Empty states
  if (!allMessages.length) {
    chatArea.innerHTML='<div class="empty-state"><div class="mascot">🐱✨</div><p>这一天还没有聊天记录哦<br>去跟他说句话吧～</p></div>';
    updateHeader(-1, 0);
    backTop.classList.remove('show');
    return;
  }
  if (kw && !msgs.length) {
    chatArea.innerHTML='<div class="no-match"><div class="icon">🔮</div><p>没有找到「'+escHtml(kw)+'」<br>换个关键词试试？</p></div>';
    updateHeader(-1, allMessages.length);
    backTop.classList.remove('show');
    return;
  }

  updateHeader(-1, allMessages.length);

  // Build with date separators
  let lastDate = '';
  const frag = document.createDocumentFragment();

  for (let i=0;i<msgs.length;i++) {
    const m = msgs[i];
    const thisDate = formatDateLabel(m.timestamp);
    if (thisDate && thisDate !== lastDate) {
      lastDate = thisDate;
      const sep = document.createElement('div');
      sep.className='date-sep';
      sep.innerHTML='<span>'+escHtml(thisDate)+'</span>';
      frag.appendChild(sep);
    }

    const row = document.createElement('div');
    row.className='msg-row '+m.from;
    row.id='m-'+i;

    let text = escHtml(m.text);
    if (kw) {
      const re = new RegExp('('+escRegex(kw)+')','gi');
      text = text.replace(re,'<mark>$1</mark>');
    }
    text = text.replace(/\n/g,'<br>');

    const ts = m.timestamp;
    const tsShort = formatShort(ts);
    const tsFull = formatFull(ts);

    const avatarHtml = m.from==='rey'
      ? '<div class="avatar avatar-rey">🐰</div>'
      : '<div class="avatar avatar-yanyan">🐱</div>';

    const statusHtml = m.from==='rey'
      ? '<span class="status status-read">✓✓</span>'
      : '';

    const bubbleHtml =
      '<div class="bubble-wrap">'+
        '<div class="hover-menu">'+
          '<button class="menu-btn" title="复制" data-action="copy" data-idx="'+i+'">📋</button>'+
          '<button class="menu-btn" title="引用" data-action="quote" data-idx="'+i+'">💬</button>'+
        '</div>'+
        '<div class="bubble">'+text+'</div>'+
        '<div class="meta-row">'+
          '<span class="time-short">'+escHtml(tsShort)+'</span>'+
          '<span class="time-full" title="'+escHtml(tsFull)+'">'+escHtml(tsFull)+'</span>'+
          statusHtml+
        '</div>'+
      '</div>';

    if (m.from==='rey') {
      row.innerHTML = bubbleHtml + avatarHtml;
    } else {
      row.innerHTML = avatarHtml + bubbleHtml;
    }

    frag.appendChild(row);
  }

  chatArea.innerHTML='';
  chatArea.appendChild(frag);

  // Scroll to first match
  if (kw) {
    const firstMark = chatArea.querySelector('mark');
    if (firstMark) firstMark.scrollIntoView({behavior:'smooth',block:'center'});
  }

  // Back to top
  backTop.classList.toggle('show', msgs.length > 6);
}

// ── Header stats ──
async function updateHeader(streakOverride, todayCountOverride) {
  let dates = [];
  try {
    const res = await fetch('/api/dates');
    dates = (await res.json()).dates || [];
  } catch(e) {}
  const streak = streakOverride >= 0 ? streakOverride : computeStreak(dates);
  const todayCount = todayCountOverride >= 0 ? todayCountOverride : 0;
  const matchPct = Math.min(99, Math.round(85 + (streak * 1.2) + Math.min(todayCount, 50) * 0.2));

  document.getElementById('streakDays').textContent = streak || '-';
  document.getElementById('todayCount').textContent = todayCount >= 0 ? todayCount : '-';
  document.getElementById('matchPct').textContent = matchPct;
}

// ── Hover menu actions ──
chatArea.addEventListener('click', e => {
  const btn = e.target.closest('.menu-btn');
  if (!btn) return;
  const action = btn.dataset.action;
  const idx = parseInt(btn.dataset.idx,10);
  const msg = allMessages[idx];
  if (!msg) return;

  if (action==='copy') {
    navigator.clipboard.writeText(msg.text).then(()=>showToast('已复制 ✓'));
  }
  if (action==='quote') {
    searchInput.value = msg.text.slice(0,30);
    searchInput.focus();
    searchInput.dispatchEvent(new Event('input'));
  }
});

// ── Toast ──
function showToast(text) {
  const t = document.createElement('div');
  t.className='toast'; t.textContent=text;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ── Events ──
searchInput.addEventListener('input', render);
clearBtn.addEventListener('click',()=>{ searchInput.value=''; render(); searchInput.focus(); });
dateSelect.addEventListener('change',()=>{ currentDate=dateSelect.value; loadMessages(); });
backTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

window.addEventListener('scroll',()=>{
  backTop.classList.toggle('show', window.scrollY > 400 && allMessages.length > 4);
});

document.addEventListener('keydown',e=>{
  if ((e.ctrlKey||e.metaKey)&&e.key==='f'){ e.preventDefault(); searchInput.focus(); }
  if (e.key==='Escape'){ searchInput.value=''; render(); }
});

// ── Helpers ──
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ── Init ──
(async function(){
  await loadDates();
  // Load all dates and dates list for streak
  let dates=[];
  try { const r=await fetch('/api/dates'); dates=(await r.json()).dates||[]; } catch(e){}
  updateHeader(computeStreak(dates), 0);
  await loadMessages();
})();
</script>
